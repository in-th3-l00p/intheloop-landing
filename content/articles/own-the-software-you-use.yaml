title: Own the software you use
number: "01"
kind: Essay
date: 2026-05-18
readingTime: 6 min
summary: >-
  Renting your tools is renting your leverage. A short argument for owning the
  software that runs your work, and what that ownership actually buys you.
body:
  - type: paragraph
    text: >-
      Most software you depend on is not yours. You hold a license, a seat, a
      subscription, a tenant. The vendor holds the leverage: the roadmap, the
      pricing, the data model, the right to deprecate. For a long time this trade
      was fine. The tools were good and cheap, and building your own made no
      sense.
  - type: paragraph
    text: >-
      That balance is shifting. The cost of building capable software has fallen
      faster than the cost of renting it, and the things you rent increasingly
      sit on the *critical path* of how you work. When the tool changes, your work
      changes, whether you agreed to it or not.
  - type: heading
    text: What ownership actually means
  - type: paragraph
    text: >-
      Ownership is not about writing everything from scratch. It is about holding
      the parts that hold you: your data, your workflows, the integrations you
      cannot afford to lose. Own those, rent the rest, and you keep the ability to
      walk away.
  - type: quote
    text: >-
      The question is not build versus buy. It is which parts of your work you can
      afford to let someone else change without asking.
  - type: paragraph
    text: >-
      The studio builds for people who have decided the answer is *fewer than they
      thought*. Small, owned systems at the points that matter, sitting quietly
      under tools that come and go.
