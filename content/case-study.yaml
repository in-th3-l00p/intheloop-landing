eyebrow: "Case Study  /  № 001 — Infrastructure"
heading: "A coordination layer at *planet* scale."
subtitle: >-
  Rebuilding the consensus and scheduling core beneath a globally distributed
  product — without a moment of downtime.
client: "Confidential · Infrastructure"
year: "2025 — 2026"
role: "Research · Engineering"
duration: "18 months"
overview:
  - >-
    The client operated a product depended on across eleven regions, coordinated
    by a scheduling core that had grown faster than anyone had intended. It
    worked — until the day it almost didn't.
  - >-
    Over eighteen months we worked alongside their infrastructure team to rebuild
    that core from first principles: a consensus and scheduling layer that could
    be reasoned about precisely, tested deterministically, and operated by a small
    on-call rotation rather than a war room. The work touched everything from the
    replication protocol to the dashboards engineers stared at in the dark.
  - >-
    We did not set out to build the largest system — only the one that could be
    understood end to end by the people responsible for it. Every decision was
    weighed against a single question: when this fails at three in the morning,
    will the answer be obvious?
quote: "The hardest systems are not the fast ones. They are the ones a tired human can still trust."
challenge:
  - >-
    The original scheduler had been correct for the load it was born into. Five
    years of growth later, its failure modes had become folklore — known by a
    handful of engineers, undocumented, and triggered by combinations no one could
    fully enumerate.
  - >-
    Three constraints shaped the work. The system could never go fully offline.
    The migration had to be reversible at every step. And the result had to be
    teachable to an engineer in their first week, not their fifth year.
approachIntro: >-
  We moved in four phases, each one shippable on its own and each one reversible.
  Nothing was a leap; everything was a step that could be walked back before dawn.
approach:
  - number: "01"
    title: "Model the system formally"
    body: "A specification first, so the failure modes were finite and named before any code changed."
  - number: "02"
    title: "Shadow the live path"
    body: "The new core ran in parallel, deciding nothing, only proving it agreed with production."
  - number: "03"
    title: "Cut over, region by region"
    body: "Traffic shifted in slices small enough that a rollback was a footnote, not an incident."
  - number: "04"
    title: "Hand it back, legibly"
    body: "Runbooks, dashboards and a model the on-call team could hold in their heads."
outcomeIntro: >-
  The cutover completed without a single second of planned downtime. More
  tellingly, the war room never reconvened — incidents that once took a room now
  take one engineer and a runbook.
stats:
  - value: "99.99%"
    label: "Sustained availability"
  - value: "4.2×"
    label: "Scheduling throughput"
  - value: "−63%"
    label: "Tail latency, p99"
  - value: "11"
    label: "Regions, zero rollbacks"
outcomeOutro: >-
  A year on, the system is still operated by the team that inherited it — which,
  for infrastructure that quietly holds up a product, is the only metric that ever
  truly mattered.
